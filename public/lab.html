<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CreativeOS — Agent Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="design-tokens.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--color-bg);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:100vh;
  font-family:var(--font-ui);
  overflow:hidden;user-select:none;
}
.topbar{
  width:min(960px,98vw);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 0 8px 0;
}
.logo{
  font-family:var(--font-display);
  font-size:11px;font-weight:800;
  letter-spacing:3px;color:var(--logo-color);text-transform:uppercase;
}
.logo em{color:var(--logo-accent-color);font-style:normal;}
.status-text{
  font-size:9px;letter-spacing:2px;
  color:var(--color-text-subtle);text-transform:uppercase;transition:color 0.4s;
}
.status-text.active{color:var(--color-primary);}
.lab-wrap{
  position:relative;width:min(960px,98vw);
  aspect-ratio:16/9;border-radius:3px;overflow:hidden;
  border:1px solid rgba(255,255,255,0.06);
  box-shadow:0 0 60px rgba(0,0,0,0.9);
}
.lab-bg{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;image-rendering:pixelated;z-index:1;
}
.lab-wrap::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 60%,transparent 30%,rgba(0,0,8,0.55) 100%);
  pointer-events:none;z-index:3;
}
#lab-canvas{
  position:absolute;inset:0;width:100%;height:100%;
  z-index:10;image-rendering:pixelated;
}
#sprite-canvas{
  position:absolute;inset:0;width:100%;height:100%;
  z-index:11;image-rendering:pixelated;
  mix-blend-mode:screen;
}
.thought{
  position:absolute;
  background:rgba(6,6,16,0.94);
  border:1px solid var(--color-primary-border);
  border-radius:10px;padding:4px 10px;
  font-size:9px;letter-spacing:1px;
  color:var(--color-text);white-space:nowrap;
  pointer-events:none;z-index:20;display:none;
  backdrop-filter:blur(8px);
  transform:translateX(-50%);
  box-shadow:0 2px 12px rgba(0,0,0,0.5);
  transition:opacity 0.15s;
}
.thought.visible{display:block;}
.thought::after{
  content:'';position:absolute;
  bottom:-5px;left:50%;
  transform:translateX(-50%) rotate(45deg);
  width:7px;height:7px;
  background:rgba(6,6,16,0.94);
  border-right:1px solid var(--color-primary-border);
  border-bottom:1px solid var(--color-primary-border);
}
.bottom-bar{
  width:min(960px,98vw);
  display:flex;align-items:center;
  gap:5px;padding-top:8px;flex-wrap:wrap;
}
.pill{
  font-size:8px;letter-spacing:0.2em;
  text-transform:uppercase;padding:4px 10px;
  border-radius:var(--radius-full);border:1px solid;
  font-family:var(--font-ui);
  transition:all 0.3s;opacity:0.3;cursor:pointer;
}
.pill.active{opacity:1;}
.pill.done{opacity:0.55;}
.demo-btn{
  margin-left:auto;font-family:var(--font-ui);
  font-size:8px;letter-spacing:2px;text-transform:uppercase;
  padding:5px 14px;background:var(--color-primary-dim);
  border:1px solid var(--color-primary-border);border-radius:var(--radius-sm);
  color:var(--color-primary);cursor:pointer;transition:all 0.2s;
}
.demo-btn:hover{background:rgba(129,140,248,0.18);}
.rst-btn{
  font-family:var(--font-ui);font-size:8px;
  letter-spacing:2px;text-transform:uppercase;
  padding:5px 12px;background:transparent;
  border:1px solid var(--color-border);border-radius:var(--radius-sm);
  color:var(--color-text-subtle);cursor:pointer;transition:all 0.2s;
}
.rst-btn:hover{border-color:var(--color-border-accent);color:var(--color-text-muted);}
</style>
</head>
<body>
<div class="topbar">
  <span class="logo">Creative<em>OS</em></span>
  <span class="status-text" id="status">Idle · Agents ready</span>
</div>
<div class="lab-wrap" id="lab">
  <img class="lab-bg" src="/assets/lab-bg.png" alt="lab">
  <canvas id="lab-canvas"></canvas>
  <canvas id="sprite-canvas"></canvas>
</div>
<div class="bottom-bar" id="pills"></div>

<script>
const AGENTS = [
  {id:'strategist',      name:'Strategist',    color:'#ff6b47', src:'/assets/strategist.png',
   thoughts:['Finding human truth…','Setting strategy…','Defining the idea…','Briefing the team…'],
   speed:0.55,scale:1.0,anchorX:0.12,anchorY:0.80},
  {id:'copywriter',      name:'Copywriter',    color:'#b47fff', src:'/assets/copywriter.png',
   thoughts:['Writing every word…','Crafting the hook…','Finding the voice…','Sharpening the CTA…'],
   speed:0.5,scale:1.0,anchorX:0.26,anchorY:0.82},
  {id:'ui_designer',     name:'UI Designer',   color:'#47ffe0', src:'/assets/ui_designer.png',
   thoughts:['Building design system…','Choosing palette…','Spacing elements…','Designing components…'],
   speed:0.52,scale:0.95,anchorX:0.40,anchorY:0.80},
  {id:'motion',          name:'Motion',        color:'#e8ff47', src:'/assets/motion.png',
   thoughts:['Setting the easing…','Timing the entrance…','Feeling the rhythm…','Animating the flow…'],
   speed:0.7,scale:1.05,anchorX:0.54,anchorY:0.82},
  {id:'creative_director',name:'Creative Dir', color:'#ff47a0', src:'/assets/creative_director.png',
   thoughts:['Reviewing the work…','Making it better…','Setting the mandate…','Finding weak links…'],
   speed:0.45,scale:1.1,anchorX:0.67,anchorY:0.80},
  {id:'developer',       name:'Developer',     color:'#47a0ff', src:'/assets/developer.png',
   thoughts:['Writing the code…','Building the UI…','Connecting the dots…','Almost there…'],
   speed:0.5,scale:1.0,anchorX:0.80,anchorY:0.82},
  {id:'qa',              name:'QA',            color:'#47ff8a', src:'/assets/qa.png',
   thoughts:['Running pass 1…','Checking interactions…','Testing edge cases…','Approving output…'],
   speed:0.52,scale:1.0,anchorX:0.91,anchorY:0.80}
];

const ZONE = {x1:0.03,x2:0.97,y1:0.56,y2:0.97};
const BASE_H = 150;

const canvas = document.getElementById('lab-canvas');
const ctx    = canvas.getContext('2d');
const spriteCanvas = document.getElementById('sprite-canvas');
const sCtx   = spriteCanvas.getContext('2d');
const lab    = document.getElementById('lab');
let W=0, H=0;

const chars = AGENTS.map((def,i)=>{
  const img=new Image();
  img.src=def.src;
  return {
    def, img,
    x:0,y:0,tx:0,ty:0,placed:false,
    facingLeft:i%2===0,
    bobPhase:Math.random()*Math.PI*2,
    bobSpeed:0.038+Math.random()*0.018,
    wanderTimer:20+Math.floor(Math.random()*60),
    state:'idle',
    thoughtEl:null,thoughtIdx:0,thoughtTimer:0,
    alpha:1,targetAlpha:1,
  };
});

chars.forEach(c=>{
  const el=document.createElement('div');
  el.className='thought'; el.id='thought-'+c.def.id;
  lab.appendChild(el);
  c.thoughtEl=el;
});

function resize(){
  const r=lab.getBoundingClientRect();
  W=canvas.width=spriteCanvas.width=r.width;
  H=canvas.height=spriteCanvas.height=r.height;
  chars.forEach(c=>{
    if(!c.placed){
      c.x=c.def.anchorX*W+(Math.random()-0.5)*30;
      c.y=c.def.anchorY*H+(Math.random()-0.5)*18;
      c.tx=c.x; c.ty=c.y; c.placed=true;
    }
  });
}
window.addEventListener('resize', resize);

function pickTarget(c){
  const zx1=ZONE.x1*W, zx2=ZONE.x2*W;
  const zy1=ZONE.y1*H, zy2=ZONE.y2*H;
  const ax=c.def.anchorX*W, ay=c.def.anchorY*H;
  if(c.state==='active'){
    c.tx=ax+(Math.random()-0.5)*W*0.12;
    c.ty=ay+(Math.random()-0.5)*H*0.08;
  } else if(c.state==='done'){
    c.tx=ax+(Math.random()-0.5)*20; c.ty=ay+(Math.random()-0.5)*12;
  } else {
    if(Math.random()<0.2){
      c.tx=zx1+Math.random()*(zx2-zx1); c.ty=zy1+Math.random()*(zy2-zy1);
    } else {
      c.tx=ax+(Math.random()-0.5)*W*0.16; c.ty=ay+(Math.random()-0.5)*H*0.1;
    }
  }
  c.tx=Math.max(zx1+8,Math.min(zx2-8,c.tx));
  c.ty=Math.max(zy1+6,Math.min(zy2-6,c.ty));
}

const particles=[];

function update(){
  chars.forEach(c=>{
    c.alpha+=(c.targetAlpha-c.alpha)*0.07;
    c.bobPhase+=c.bobSpeed*(c.state==='active'?1.5:1);
    c.wanderTimer--;
    if(c.wanderTimer<=0){
      pickTarget(c);
      c.wanderTimer=c.state==='active'?30+Math.floor(Math.random()*50):65+Math.floor(Math.random()*120);
    }
    const dx=c.tx-c.x, dy=c.ty-c.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    const spd=c.def.speed*(c.state==='active'?1.4:1);
    if(dist>1.5){ c.x+=(dx/dist)*spd; c.y+=(dy/dist)*spd; c.facingLeft=dx<0; }
    if(c.state==='active'){
      c.thoughtTimer++;
      if(c.thoughtTimer>155){
        c.thoughtTimer=0;
        c.thoughtIdx=(c.thoughtIdx+1)%c.def.thoughts.length;
        c.thoughtEl.style.opacity='0';
        setTimeout(()=>{ c.thoughtEl.textContent=c.def.thoughts[c.thoughtIdx]; c.thoughtEl.style.opacity='1'; },130);
      }
    }
  });
}

function draw(){
  ctx.clearRect(0,0,W,H);
  sCtx.clearRect(0,0,W,H);

  const sorted=[...chars].sort((a,b)=>a.y-b.y);
  sorted.forEach(c=>{
    const img=c.img;
    if(!img||!img.complete||!img.naturalWidth) return;
    const natW=img.naturalWidth;
    const natH=img.naturalHeight;

    const vscale=W/960;
    const depthS=0.88+(c.y/H)*0.26;
    const dh=BASE_H*c.def.scale*vscale*depthS;
    const dw=(natW/natH)*dh;

    // Walk cycle
    const dist=Math.sqrt((c.tx-c.x)**2+(c.ty-c.y)**2);
    const isWalking=dist>4;
    const stepFreq=isWalking?2:1;
    const bob=Math.sin(c.bobPhase*stepFreq)*3.5*(c.state==='active'?1.3:1);
    const squash=isWalking?1+Math.sin(c.bobPhase*stepFreq*2)*0.035:1;
    const lean=isWalking?Math.sin(c.bobPhase*stepFreq)*0.052:0;

    // ── Effects canvas (shadows, glow) ──────────────────────────
    ctx.save();
    ctx.globalAlpha=c.alpha;
    ctx.translate(c.x, c.y);
    ctx.rotate(lean*(c.facingLeft?-1:1));
    if(c.facingLeft){ ctx.scale(-1,1); }
    ctx.scale(1, squash);

    if(c.state==='active'){
      const grd=ctx.createRadialGradient(0,0,0,0,0,dw*0.7);
      grd.addColorStop(0,c.def.color+'55'); grd.addColorStop(1,'transparent');
      ctx.fillStyle=grd;
      ctx.beginPath(); ctx.ellipse(0,0,dw*0.7,dw*0.2,0,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=0.22*c.alpha;
    ctx.fillStyle='rgba(0,0,0,1)';
    ctx.beginPath(); ctx.ellipse(0,0,dw*0.33,dw*0.09,0,0,Math.PI*2); ctx.fill();

    if(c.state==='done'){
      ctx.globalAlpha=c.alpha;
      ctx.font=`bold ${Math.round(dh*0.2)}px sans-serif`;
      ctx.fillStyle=c.def.color; ctx.textAlign='center';
      ctx.fillText('✓', dw*0.3*(c.facingLeft?-1:1), -dh+bob+dh*0.14);
    }
    ctx.restore();

    // ── Sprite canvas (screen blend removes black bg) ────────────
    sCtx.save();
    sCtx.globalAlpha=c.alpha;
    sCtx.translate(c.x, c.y);
    sCtx.rotate(lean*(c.facingLeft?-1:1));
    if(c.facingLeft){ sCtx.scale(-1,1); }
    sCtx.scale(1, squash);
    sCtx.drawImage(img, -dw/2, -dh+bob, dw, dh);
    sCtx.restore();

    // Thought bubble
    if(c.state==='active'){
      c.thoughtEl.style.borderColor=c.def.color+'66';
      c.thoughtEl.style.left=c.x+'px';
      c.thoughtEl.style.top=(c.y-dh+bob-32)+'px';
      if(!c.thoughtEl.classList.contains('visible')){
        c.thoughtEl.textContent=c.def.thoughts[0];
        c.thoughtEl.classList.add('visible');
      }
    } else { c.thoughtEl.classList.remove('visible'); }
  });

  // Particles on effects canvas
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.09; p.life-=0.022;
    if(p.life<=0){ particles.splice(i,1); continue; }
    ctx.save(); ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

function loop(){ update(); draw(); requestAnimationFrame(loop); }

function buildPills(){
  const bar=document.getElementById('pills');
  bar.innerHTML='';
  AGENTS.forEach(a=>{
    const p=document.createElement('span');
    p.className='pill'; p.id='pill-'+a.id;
    p.textContent=a.name; p.style.color=a.color; p.style.borderColor=a.color+'44';
    p.onclick=()=>activateAgent(a.id);
    bar.appendChild(p);
  });
  const btn=document.createElement('button');
  btn.className='demo-btn'; btn.innerHTML='▶ Run Demo'; btn.onclick=runDemo;
  btn.style.marginLeft='auto'; bar.appendChild(btn);
  const rst=document.createElement('button');
  rst.className='rst-btn'; rst.innerHTML='↺ Reset'; rst.onclick=resetAll;
  bar.appendChild(rst);
}

let demoTimer=null;

function activateAgent(id){
  const s=document.getElementById('status');
  chars.forEach(c=>{
    if(c.def.id===id){
      c.state='active'; c.targetAlpha=1;
      c.thoughtIdx=0; c.thoughtTimer=0; c.wanderTimer=0;
      document.getElementById('pill-'+id).classList.add('active');
      s.textContent=c.def.name+' is working…'; s.style.color=c.def.color;
    } else if(c.state!=='done'){
      c.state='idle'; c.targetAlpha=0.75;
      document.getElementById('pill-'+c.def.id).classList.remove('active');
    }
  });
}

function markDone(id){
  const c=chars.find(x=>x.def.id===id);
  if(!c) return;
  c.state='done'; c.targetAlpha=0.9;
  for(let i=0;i<12;i++){
    const a=(i/12)*Math.PI*2, spd=1.8+Math.random()*2.5;
    particles.push({x:c.x,y:c.y-20,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-2,life:1,color:c.def.color,r:2+Math.random()*2.5});
  }
  document.getElementById('pill-'+id).classList.remove('active');
  document.getElementById('pill-'+id).classList.add('done');
}

function resetAll(){
  clearTimeout(demoTimer);
  chars.forEach(c=>{ c.state='idle'; c.targetAlpha=1; });
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active','done'));
  const s=document.getElementById('status'); s.textContent='Idle · Agents ready'; s.style.color='';
}

function runDemo(){
  resetAll();
  const order=AGENTS.map(a=>a.id); let i=0;
  function step(){
    if(i>0) markDone(order[i-1]);
    if(i>=order.length){
      const s=document.getElementById('status'); s.textContent='✓ Pipeline complete'; s.style.color='#47ff8a'; return;
    }
    activateAgent(order[i++]); demoTimer=setTimeout(step,2800);
  }
  step();
}

// Public API — called from parent index.html via iframe
window.CreativeOSLab = { activateAgent, markDone, resetAll, runDemo };

buildPills();
resize();
chars.forEach((c,i)=>setTimeout(()=>{
  c.x=c.def.anchorX*W+(Math.random()-0.5)*35;
  c.y=c.def.anchorY*H+(Math.random()-0.5)*22;
  c.tx=c.x; c.ty=c.y; c.placed=true; pickTarget(c);
},i*70));
requestAnimationFrame(loop);
</script>
</body>
</html>
