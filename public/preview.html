<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CreativeOS — Preview</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%236366F1'/><text x='50%' y='50%' dominant-baseline='central' text-anchor='middle' font-family='system-ui' font-weight='800' font-size='18' fill='white'>C</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="design-tokens.css">
<script src="theme.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--color-bg);
  color: var(--color-text);
  font-family: var(--font-ui);
  min-height: 100dvh;
}

/* ── TOPBAR ── */
.topbar {
  position: fixed; top:0; left:0; right:0; z-index:100;
  height: 48px;
  background: var(--topbar-bg);
  border-bottom: 1px solid var(--topbar-border);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  display: flex; align-items: center;
  padding: 0 var(--space-5);
  gap: var(--space-5);
}
.logo {
  font-family: var(--font-display);
  font-size: 16px; font-weight: 800;
  color: var(--logo-color);
  letter-spacing: -0.02em;
  flex-shrink: 0;
}
.logo em { color: var(--logo-accent-color); font-style: normal; }
.nav { display:flex; gap: var(--space-4); align-items:center; }
.nav-link {
  font-size: 11px; font-weight: 500; letter-spacing: 0.04em;
  color: var(--nav-color); text-decoration: none;
  transition: color var(--duration-normal);
}
.nav-link:hover { color: var(--nav-hover-color); }
.nav-link.active { color: var(--nav-active-color); }
.badge {
  font-size: 9px; font-weight: 500; letter-spacing: 0.06em;
  background: var(--badge-bg); color: var(--badge-color);
  padding: 3px 7px; border-radius: var(--radius-full);
}

/* ── LAYOUT ── */
.page {
  padding-top: 72px;
  padding-bottom: var(--space-7);
  max-width: 1100px;
  margin: 0 auto;
  padding-left: var(--space-5);
  padding-right: var(--space-5);
}

.page-hdr {
  margin-bottom: var(--space-5);
  display: flex;
  align-items: baseline;
  gap: var(--space-3);
}
.page-title {
  font-family: var(--font-display);
  font-size: 28px; font-weight: 800;
  letter-spacing: -0.04em;
  color: var(--color-text);
}
.page-count {
  font-size: 11px;
  color: var(--color-text-muted);
}

/* ── EMPTY STATE ── */
.empty {
  text-align: center;
  padding: 80px var(--space-5);
  color: var(--color-text-muted);
}
.empty-icon {
  font-size: 40px;
  margin-bottom: var(--space-3);
  opacity: 0.3;
  line-height: 1;
}
.empty-title {
  font-family: var(--font-display);
  font-size: 18px; font-weight: 700;
  color: var(--color-text);
  margin-bottom: var(--space-2);
}
.empty-body {
  font-size: 12px; line-height: 1.6;
  color: var(--color-text-muted);
  max-width: 320px; margin: 0 auto var(--space-4);
}
.empty-cta {
  display: inline-block;
  font-size: 11px; font-weight: 500;
  color: var(--color-primary);
  text-decoration: none;
  padding: 8px 16px;
  border: 1px solid var(--color-primary-border);
  border-radius: var(--radius-md);
  transition: background var(--duration-fast), border-color var(--duration-fast);
}
.empty-cta:hover {
  background: var(--color-primary-dim);
  border-color: rgba(129,140,248,0.40);
}

/* ── JOB GRID ── */
.job-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: var(--space-4);
}

.job-card {
  background: rgba(255,255,255,0.025);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: var(--radius-lg);
  padding: var(--space-4);
  display: flex; flex-direction: column; gap: var(--space-3);
  transition: border-color var(--duration-normal), background var(--duration-normal);
  cursor: pointer;
  text-decoration: none;
  color: inherit;
  position: relative;
  overflow: hidden;
}
.job-card::before {
  content: '';
  position: absolute; top:0; left:0; right:0; height:1px;
  background: linear-gradient(90deg, transparent, rgba(129,140,248,0.15), transparent);
  opacity: 0;
  transition: opacity var(--duration-normal);
}
.job-card:hover {
  border-color: rgba(129,140,248,0.22);
  background: rgba(129,140,248,0.04);
}
.job-card:hover::before { opacity: 1; }

.job-meta {
  display: flex; justify-content: space-between; align-items: center;
}
.job-client {
  font-size: 10px; font-weight: 500; letter-spacing: 0.05em;
  color: var(--color-primary);
  text-transform: uppercase;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  max-width: 60%;
}
.job-date {
  font-size: 10px;
  color: var(--color-text-muted);
  flex-shrink: 0;
}

.job-brief {
  font-size: 12px; line-height: 1.55;
  color: var(--color-text);
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.job-footer {
  display: flex; justify-content: space-between; align-items: center;
  padding-top: var(--space-2);
  border-top: 1px solid rgba(255,255,255,0.05);
}
.job-type-badge {
  font-size: 9px; letter-spacing: 0.05em;
  color: var(--color-text-muted);
  background: rgba(255,255,255,0.04);
  padding: 3px 8px;
  border-radius: var(--radius-full);
  text-transform: uppercase;
}
.job-open {
  font-size: 10px; font-weight: 500;
  color: var(--color-primary);
  display: flex; align-items: center; gap: 4px;
}
.job-open svg { width:10px; height:10px; }

/* ── LOADING ── */
.loader {
  display: flex; align-items: center; gap: var(--space-3);
  padding: var(--space-5) 0;
  color: var(--color-text-muted);
  font-size: 12px;
}
.loader-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--color-primary);
  animation: pulse-dot 1.2s ease-in-out infinite;
}
.loader-dot:nth-child(2) { animation-delay: 0.2s; }
.loader-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes pulse-dot {
  0%,100% { opacity: 0.2; transform: scale(0.8); }
  50%      { opacity: 1;   transform: scale(1); }
}
</style>
</head>
<body>

<nav class="topbar">
  <span class="logo">Creative<em>OS</em></span>
  <div class="nav">
    <a class="nav-link" href="/">Pipeline</a>
    <a class="nav-link" href="/styles-explorer.html">Styles</a>
    <a class="nav-link active" href="/preview.html">Preview</a>
    <a class="nav-link" href="/usage.html">Usage</a>
    <a class="nav-link" href="/landing.html">About</a>
    <span class="badge">Early Access</span>
  </div>
</nav>

<main class="page">
  <div class="page-hdr">
    <h1 class="page-title">Output Library</h1>
    <span class="page-count" id="count"></span>
  </div>
  <div id="content">
    <div class="loader">
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
      Loading outputs&hellip;
    </div>
  </div>
</main>

<script>
function fmtDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB', {day:'numeric', month:'short', year:'numeric'}) +
    ' · ' + d.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
}

function fmtType(intel) {
  if (!intel) return 'Campaign';
  const t = (intel.campaignType || intel.type || '').replace(/_/g,' ');
  return t.charAt(0).toUpperCase() + t.slice(1) || 'Campaign';
}

async function loadJobs() {
  const content = document.getElementById('content');
  try {
    const res = await fetch('/jobs');
    const jobs = await res.json();

    if (!jobs.length) {
      content.innerHTML = `
        <div class="empty">
          <div class="empty-icon">◎</div>
          <div class="empty-title">No outputs yet</div>
          <div class="empty-body">Run your first brief through the pipeline and the output will appear here.</div>
          <a class="empty-cta" href="/">Run a Brief</a>
        </div>`;
      return;
    }

    document.getElementById('count').textContent = jobs.length + ' output' + (jobs.length !== 1 ? 's' : '');

    content.innerHTML = `<div class="job-grid">${
      jobs.map(j => `
        <a class="job-card" href="/output/${j.id}.html" target="_blank" rel="noopener">
          <div class="job-meta">
            <span class="job-client">${j.client || 'Unnamed Client'}</span>
            <span class="job-date">${fmtDate(j.createdAt)}</span>
          </div>
          <div class="job-brief">${j.brief || ''}</div>
          <div class="job-footer">
            <span class="job-type-badge">${fmtType(j.intelligence)}</span>
            <span class="job-open">
              Open
              <svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M2 8L8 2M5 2h3v3"/>
              </svg>
            </span>
          </div>
        </a>`
      ).join('')
    }</div>`;

  } catch(e) {
    content.innerHTML = `
      <div class="empty">
        <div class="empty-icon">⚠</div>
        <div class="empty-title">Could not load outputs</div>
        <div class="empty-body">Make sure the CreativeOS server is running.</div>
        <a class="empty-cta" href="/">Go to Pipeline</a>
      </div>`;
  }
}

loadJobs();
</script>
</body>
</html>
