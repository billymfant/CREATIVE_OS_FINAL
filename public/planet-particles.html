<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Particle Planet</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000008; overflow: hidden; width: 100vw; height: 100vh; }
  canvas { display: block; }
  #ui {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 12px; z-index: 10;
  }
  .btn {
    font-family: 'Courier New', monospace; font-size: 11px; letter-spacing: 2px;
    color: rgba(6,182,212,0.8); border: 1px solid rgba(6,182,212,0.3);
    background: rgba(0,0,20,0.7); padding: 8px 18px; cursor: pointer;
    text-transform: uppercase; transition: all 0.2s; backdrop-filter: blur(4px);
  }
  .btn:hover { color: #06b6d4; border-color: rgba(6,182,212,0.8); box-shadow: 0 0 12px rgba(6,182,212,0.3); }
  #hint {
    position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
    font-family: 'Courier New', monospace; font-size: 11px; letter-spacing: 3px;
    color: rgba(148,163,184,0.5); text-transform: uppercase; pointer-events: none;
    transition: opacity 1s;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">DRAG TO INTERACT · CLICK TO EXPLODE</div>
<div id="ui">
  <button class="btn" onclick="explode()">EXPLODE</button>
  <button class="btn" onclick="reform()">REFORM</button>
  <button class="btn" onclick="cyclePalette()">PALETTE</button>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H, cx, cy, radius;
let mouse = { x: -9999, y: -9999, down: false };
let particles = [];
let stars = [];
let rotation = 0;
let palette = 0;
let exploding = false;
let hintOpacity = 1;

const PALETTES = [
  { a: '#06b6d4', b: '#8b5cf6', c: '#f59e0b', atm: 'rgba(99,102,241,0.12)' },
  { a: '#10b981', b: '#06b6d4', c: '#f59e0b', atm: 'rgba(16,185,129,0.12)' },
  { a: '#f59e0b', b: '#ef4444', c: '#fbbf24', atm: 'rgba(245,158,11,0.12)' },
  { a: '#ec4899', b: '#8b5cf6', c: '#f59e0b', atm: 'rgba(236,72,153,0.12)' },
];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2; cy = H / 2;
  radius = Math.min(W, H) * 0.28;
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

function lerpColor(c1, c2, t) {
  const a = hexToRgb(c1), b = hexToRgb(c2);
  return `rgb(${Math.round(a.r+(b.r-a.r)*t)},${Math.round(a.g+(b.g-a.g)*t)},${Math.round(a.b+(b.b-a.b)*t)})`;
}

function fibSphere(n) {
  const pts = [];
  const golden = Math.PI * (3 - Math.sqrt(5));
  for (let i = 0; i < n; i++) {
    const y = 1 - (i / (n - 1)) * 2;
    const r = Math.sqrt(1 - y * y);
    const theta = golden * i;
    pts.push({ x: Math.cos(theta) * r, y, z: Math.sin(theta) * r });
  }
  return pts;
}

class Particle {
  constructor(i, total) {
    this.i = i;
    this.total = total;
    this.reset(i, total);
    // start scattered
    this.x = cx + (Math.random()-0.5) * W * 1.5;
    this.y = cy + (Math.random()-0.5) * H * 1.5;
    this.z = (Math.random()-0.5) * 2;
    this.vx = 0; this.vy = 0;
    this.assembling = true;
    this.assembleDelay = i * 0.4;
    this.size = Math.random() * 1.5 + 0.5;
  }

  reset(i, total) {
    const pts = fibSphere(total);
    const p = pts[i];
    this.phi = Math.acos(p.y);
    this.theta = Math.atan2(p.z, p.x);
    this.baseSize = Math.random() * 1.8 + 0.4;
    this.drift = (Math.random()-0.5) * 0.002;
    this.driftY = (Math.random()-0.5) * 0.001;
    this.orbitOffset = Math.random() * Math.PI * 2;
    this.t = Math.random() * 0.8 + 0.1;
  }

  getTarget(rot) {
    const theta = this.theta + rot;
    const sinPhi = Math.sin(this.phi);
    const x3 = Math.cos(theta) * sinPhi;
    const y3 = Math.cos(this.phi);
    const z3 = Math.sin(theta) * sinPhi;
    const persp = 1 + z3 * 0.35;
    return {
      x: cx + x3 * radius * persp,
      y: cy + y3 * radius * persp,
      z: z3,
      persp
    };
  }

  update(rot, dt) {
    if (this.assembleDelay > 0) {
      this.assembleDelay -= dt * 60;
      return;
    }

    const target = this.getTarget(rot);

    if (exploding) {
      this.vx += (Math.random()-0.5) * 3;
      this.vy += (Math.random()-0.5) * 3;
      this.x += this.vx;
      this.y += this.vy;
      this.vx *= 0.97; this.vy *= 0.97;
    } else {
      // mouse repulsion
      const dx = this.x - mouse.x;
      const dy = this.y - mouse.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const repelRadius = 80;

      if (dist < repelRadius) {
        const force = (repelRadius - dist) / repelRadius;
        this.vx += (dx / dist) * force * 3;
        this.vy += (dy / dist) * force * 3;
      }

      // attract to target
      const atx = target.x - this.x;
      const aty = target.y - this.y;
      this.vx += atx * 0.08;
      this.vy += aty * 0.08;
      this.vx *= 0.82;
      this.vy *= 0.82;
      this.x += this.vx;
      this.y += this.vy;
    }

    // reform pull
    if (exploding) return;
    const t2 = this.getTarget(rot);
    const dx2 = t2.x - this.x;
    const dy2 = t2.y - this.y;
    const d2 = Math.sqrt(dx2*dx2 + dy2*dy2);
    if (d2 < 200) {
      this.vx += dx2 * 0.04;
      this.vy += dy2 * 0.04;
    }
  }

  draw(rot) {
    const pal = PALETTES[palette];
    const color = lerpColor(pal.a, pal.b, this.t);
    const target = this.getTarget(rot);
    const brightness = 0.5 + (target.z + 1) * 0.25;
    const sz = this.baseSize * (0.7 + target.z * 0.3) * (1 + Math.abs(this.vx + this.vy) * 0.05);

    ctx.beginPath();
    ctx.arc(this.x, this.y, Math.max(sz, 0.3), 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.globalAlpha = Math.max(0.2, brightness);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function initStars() {
  stars = [];
  for (let i = 0; i < 200; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.2 + 0.1,
      a: Math.random() * 0.7 + 0.1,
      twinkle: Math.random() * Math.PI * 2
    });
  }
}

function initParticles() {
  const N = Math.min(2000, Math.floor(W * H / 400));
  particles = [];
  for (let i = 0; i < N; i++) {
    particles.push(new Particle(i, N));
  }
}

function explode() {
  exploding = true;
  setTimeout(() => { exploding = false; }, 1200);
}

function reform() {
  exploding = false;
  particles.forEach(p => {
    p.vx = 0; p.vy = 0;
  });
}

function cyclePalette() {
  palette = (palette + 1) % PALETTES.length;
}

let last = 0;
function loop(ts) {
  const dt = Math.min((ts - last) / 1000, 0.05);
  last = ts;

  ctx.fillStyle = 'rgba(0,0,8,0.18)';
  ctx.fillRect(0, 0, W, H);

  // stars
  stars.forEach(s => {
    s.twinkle += 0.02;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${s.a * (0.6 + 0.4 * Math.sin(s.twinkle))})`;
    ctx.fill();
  });

  rotation += 0.003;

  // atmosphere glow
  const pal = PALETTES[palette];
  const grd = ctx.createRadialGradient(cx, cy, radius * 0.8, cx, cy, radius * 1.4);
  grd.addColorStop(0, pal.atm);
  grd.addColorStop(1, 'transparent');
  ctx.beginPath();
  ctx.arc(cx, cy, radius * 1.4, 0, Math.PI * 2);
  ctx.fillStyle = grd;
  ctx.fill();

  // core glow
  const coreGrd = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius * 0.5);
  coreGrd.addColorStop(0, `rgba(245,158,11,0.15)`);
  coreGrd.addColorStop(1, 'transparent');
  ctx.beginPath();
  ctx.arc(cx, cy, radius * 0.5, 0, Math.PI * 2);
  ctx.fillStyle = coreGrd;
  ctx.fill();

  // update & draw particles
  particles.forEach(p => {
    p.update(rotation, dt);
    p.draw(rotation);
  });

  // hint fade
  if (hintOpacity > 0) {
    hintOpacity -= 0.003;
    document.getElementById('hint').style.opacity = hintOpacity;
  }

  requestAnimationFrame(loop);
}

// events
canvas.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
canvas.addEventListener('mouseleave', () => { mouse.x = -9999; mouse.y = -9999; });
canvas.addEventListener('click', explode);
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  mouse.x = e.touches[0].clientX;
  mouse.y = e.touches[0].clientY;
}, { passive: false });
canvas.addEventListener('touchend', () => { mouse.x = -9999; mouse.y = -9999; });
window.addEventListener('resize', () => { resize(); initStars(); });

resize();
initStars();
initParticles();
requestAnimationFrame(loop);
</script>
</body>
</html>
